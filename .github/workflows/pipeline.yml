name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:

jobs:

  lint:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Lint Python
        run: |
          pip install flake8
          flake8 .

      - name: Lint JS
        run: |
          npm install -g eslint
          eslint frontend || true

  build:
    runs-on: ubuntu-latest
    needs: lint

    steps:
      - uses: actions/checkout@v3

      - name: Build API
        run: docker build -t api ./api

      - name: Build Worker
        run: docker build -t worker ./worker

      - name: Build Frontend
        run: docker build -t frontend ./frontend

  integration-test:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for services
        run: sleep 15

      - name: Test API
        run: curl http://localhost:8000 || true

      - name: Stop services
        run: docker compose down
